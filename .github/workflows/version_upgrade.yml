---
name: Test Ansible Roles

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run on the 1st of every month at 06:00 UTC
    - cron: "0 6 1 * *"
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install ansible-core ansible-lint yamllint
          ansible-galaxy collection install -r requirements.yml

      - name: Run yamllint
        run: |
          # yamllint exits 1 for warnings, 2 for errors
          # Only fail on errors (exit code 2+)
          yamllint . || test $? -eq 1

      - name: Run ansible-lint
        run: ansible-lint

  molecule:
    name: "Molecule - ${{ matrix.role }}"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        role:
          - basic_config
          - hardenServer
          - init_ansible
          - authentik
          - certbot
          - docker
          - installWebApp
          - nginxWebServer
          - gunicornSetup
          - celerySetup
          - postgresqlSetup
          - headscale
          - traefik
          - opencpu
          - updateWebApp
          - buildFrontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install ansible-core molecule molecule-plugins[docker] docker
          ansible-galaxy collection install -r requirements.yml

      - name: Run Molecule tests
        run: molecule test
        working-directory: roles/${{ matrix.role }}
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
          MOLECULE_DISTRO: ubuntu2204

  compound:
    name: "Compound - ${{ matrix.scenario }}"
    runs-on: ubuntu-latest
    needs: molecule
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - compound-docker-auth-headscale
          - compound-docker-auth-opencpu
          - compound-full-stack
          - compound-django-stack
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install ansible-core molecule molecule-plugins[docker] docker
          ansible-galaxy collection install -r requirements.yml

      - name: Verify test directory exists
        run: |
          echo "Listing tests/ directory:"
          ls -la tests/ || echo "tests/ directory does not exist"
          echo "---"
          ls -la tests/${{ matrix.scenario }}/molecule/default/ || echo "scenario directory does not exist"

      - name: Run Molecule compound tests
        run: molecule test
        working-directory: tests/${{ matrix.scenario }}
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
          MOLECULE_DISTRO: ubuntu2204

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [molecule, compound]
    # Only release on scheduled runs or manual dispatch against main
    if: >-
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
      && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for tag listing

      - name: Compute next version
        id: version
        run: |
          YEAR=$(date -u +%Y)
          MONTH=$(date -u +%-m)
          PREFIX="${YEAR}.${MONTH}"

          # Find the highest running number for this month
          LAST=$(git tag --list "${PREFIX}.*" --sort=-v:refname | head -n1)

          if [ -z "$LAST" ]; then
            NEXT="${PREFIX}.1"
          else
            # Extract the running number and increment
            RUNNING=$(echo "$LAST" | awk -F. '{print $3}')
            NEXT="${PREFIX}.$((RUNNING + 1))"
          fi

          echo "version=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "Computed next version: ${NEXT}"

      - name: Update galaxy.yml version
        run: |
          sed -i "s/^version: .*/version: ${{ steps.version.outputs.version }}/" galaxy.yml
          echo "Updated galaxy.yml to version ${{ steps.version.outputs.version }}"
          grep '^version:' galaxy.yml

      - name: Commit version bump to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add galaxy.yml
          git commit -m "release: bump version to ${{ steps.version.outputs.version }}"
          git push origin main

      - name: Create and push tag
        run: |
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --title "Release ${{ steps.version.outputs.version }}" \
            --notes "Release ${{ steps.version.outputs.version }}"
