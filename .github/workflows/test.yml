---
name: Test Ansible Roles

on:
  push:
    branches: [main, cleaning-up]
  pull_request:
    branches: [main]
  schedule:
    # Run on the 1st of every month at 06:00 UTC
    - cron: "0 6 1 * *"
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install ansible-core ansible-lint yamllint
          ansible-galaxy collection install -r requirements.yml

      - name: Run yamllint
        run: |
          # yamllint exits 1 for warnings, 2 for errors
          # Only fail on errors (exit code 2+)
          yamllint . || test $? -eq 1

      - name: Run ansible-lint
        run: ansible-lint

  molecule:
    name: "Molecule - ${{ matrix.role }}"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        role:
          - basic_config
          - hardenServer
          - init_ansible
          - authentik
          - certbot
          - docker
          - installWebApp
          - nginxWebServer
          - gunicornSetup
          - celerySetup
          - postgresqlSetup
          - headscale
          - traefik
          - opencpu
          - updateWebApp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install ansible-core molecule molecule-plugins[docker] docker
          ansible-galaxy collection install -r requirements.yml

      - name: Run Molecule tests
        run: molecule test
        working-directory: roles/${{ matrix.role }}
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
          MOLECULE_DISTRO: ubuntu2204

  tag:
    name: Create monthly release tag
    runs-on: ubuntu-latest
    needs: molecule
    # Only tag on scheduled runs or manual dispatch against main
    if: >-
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
      && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for tag listing

      - name: Compute next tag
        id: compute_tag
        run: |
          YEAR=$(date -u +%Y)
          MONTH=$(date -u +%-m)
          PREFIX="${YEAR}.${MONTH}"

          # Find the highest running number for this month
          LAST=$(git tag --list "${PREFIX}.*" --sort=-v:refname | head -n1)

          if [ -z "$LAST" ]; then
            NEXT="${PREFIX}.1"
          else
            # Extract the running number and increment
            RUNNING=$(echo "$LAST" | awk -F. '{print $3}')
            NEXT="${PREFIX}.$((RUNNING + 1))"
          fi

          echo "tag=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "Computed next tag: ${NEXT}"

      - name: Create and push tag
        run: |
          git tag "${{ steps.compute_tag.outputs.tag }}"
          git push origin "${{ steps.compute_tag.outputs.tag }}"
