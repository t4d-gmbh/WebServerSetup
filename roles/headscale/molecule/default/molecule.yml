---
role_name_check: 1
driver:
  name: docker
platforms:
  - name: instance
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /var/lib/docker:exec
      - /var/lib/containerd
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "../../../"
  inventory:
    host_vars:
      instance:
        dancer_user: testuser
        headscale:
          version: "0.26.1"
        server_url: "https://hs.test.example.com"
        prefixes_v4: "100.64.0.0/10"
        prefixes_v6: "fd7a:115c:a1e0::/48"
        email: "test@example.com"
        nameservers:
          - "1.1.1.1"
          - "9.9.9.9"
        dns_provider: infomaniak
        generate_new_api_key: false
scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    # Skip idempotence - docker_compose_v2 interactions
    - verify
    - cleanup
    - destroy
