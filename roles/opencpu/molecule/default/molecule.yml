---
role_name_check: 1
driver:
  name: docker
platforms:
  - name: instance
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "../../"
  inventory:
    host_vars:
      instance:
        docker_user: testuser
        dns_provider: infomaniak
        opencpu:
          DOMAIN: "r.test.example.com"
          AUTHENTIK_PROXY_CONTAINER: "authentik-server"
          CONTAINER_NAME: "opencpu"
          DOCKER_IMAGE: "docker.io/opencpu/ubuntu-24.04"
          DOCKER_TAG: "v2.2.14-2"
          RUN_R: []
scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    # Skip idempotence - Docker image pull and compose
    - verify
    - cleanup
    - destroy
