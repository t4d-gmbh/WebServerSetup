- name: Update and upgrade packages
  become: true
  apt:
    update_cache: yes
    upgrade: dist

- name: Install necessary packages
  become: true
  apt:
    name:
      - ufw
      - fail2ban
    state: present

- name: Set UFW default deny incoming
  become: true
  ufw:
    direction: incoming
    policy: deny
  tags:
    - molecule-notest

- name: Set UFW default allow outgoing
  become: true
  ufw:
    direction: outgoing
    policy: allow
  tags:
    - molecule-notest

- name: Enable UFW
  become: true
  ufw:
    state: enabled
  tags:
    - molecule-notest

- name: Enable UFW logging
  become: true
  ufw:
    logging: on
  tags:
    - molecule-notest

- name: Start and enable fail2ban
  become: true
  service:
    name: fail2ban
    state: started
    enabled: true
  tags:
    - molecule-notest

- name: Configure SSH
  become: true
  block:
    - name: Install OpenSSH
      apt:
        name: openssh-server
        state: present
    - name: Allow SSH
      ufw:
        rule: allow
        name: OpenSSH
      notify: Restart UFW
      tags:
        - molecule-notest
  when: "'ssh' in enable_services"

- name: Configure Nginx
  become: true
  block:
    - name: Install Nginx
      apt:
        name: nginx
        state: present
    - name: Allow Nginx Full traffic
      ufw:
        rule: allow
        name: 'Nginx Full'
      notify: Restart UFW
      tags:
        - molecule-notest
  when: "'nginx' in enable_services"

- name: Configure Samba
  become: true
  block:
    - name: Install Samba
      apt:
        name: samba
        state: present
    - name: Allow Samba
      ufw:
        rule: allow
        name: 'Samba'
      notify: Restart UFW
      tags:
        - molecule-notest
  when: "'samba' in enable_services"

- name: Configure NFS
  become: true
  block:
    - name: Install NFS
      apt:
        name: nfs-common
        state: present
    - name: Allow NFS TCP
      ufw:
        rule: allow
        port: "2049"
        proto: tcp
      notify: Restart UFW
      tags:
        - molecule-notest
    - name: Allow NFS UDP
      ufw:
        rule: allow
        port: "2049"
        proto: udp
      notify: Restart UFW
      tags:
        - molecule-notest
  when: "'nfs' in enable_services"

- name: Configure Tailscale
  become: true
  block:
    - name: Add Tailscale GPG key
      ansible.builtin.apt_key:
        url: "https://pkgs.tailscale.com/stable/{{ ansible_distribution | lower }}/{{ ansible_distribution_release }}.noarmor.gpg"
        state: present
    - name: Add Tailscale repository
      apt_repository:
        repo: "deb https://pkgs.tailscale.com/stable/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} main"
        state: present
    - name: Install Tailscale
      apt:
        name: tailscale
        state: present
        update_cache: yes
    - name: Allow Tailscale UDP
      ufw:
        rule: allow
        port: "41641"
        proto: udp
      notify: Restart UFW
      tags:
        - molecule-notest
    - name: Allow Tailscale TCP
      ufw:
        rule: allow
        port: "443"
        proto: tcp
      notify: Restart UFW
      tags:
        - molecule-notest
  when: "'tailscale' in enable_services"

- name: Harden SSH configuration
  become: true
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?{{ item.key }}'
    line: '{{ item.key }} {{ item.value }}'
  loop:
    # NOTE: PasswordAuthentication is handled by the init_ansible role
    - { key: 'PermitRootLogin', value: 'no' }
    # KbdInteractiveAuthentication replaces the deprecated ChallengeResponseAuthentication (OpenSSH 8.7+)
    - { key: 'KbdInteractiveAuthentication', value: 'no' }
    # NOTE: UsePAM must remain enabled - PAM handles session/account setup even for pubkey auth
  notify: Restart SSH
  when: "'ssh' in enable_services"
