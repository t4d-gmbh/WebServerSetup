---
role_name_check: 1
driver:
  name: docker
platforms:
  - name: instance
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  inventory:
    host_vars:
      instance:
        dancer_user: testuser
        traefik:
          version: "3.5.4"
        dns_provider: infomaniak
        email: "test@example.com"
        HTPASSWD_USERS:
          - name: admin
            pw_hash: "$apr1$test$testhash"
        TRAEFIK_ENV:
          INFOMANIAK_ACCESS_TOKEN: "test-token"
scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    # Skip idempotence - docker_compose_v2 interactions
    - verify
    - cleanup
    - destroy
