---
# Install Node.js from NodeSource repository
- name: Install Node.js prerequisites
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: yes
  become: yes

- name: Add NodeSource GPG key
  ansible.builtin.apt_key:
    url: "https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key"
    state: present
  become: yes

- name: Add NodeSource repository
  apt_repository:
    repo: "deb https://deb.nodesource.com/node_{{ node_major_version }}.x nodistro main"
    state: present
    filename: nodesource
  become: yes

- name: Install Node.js
  apt:
    name: nodejs
    state: present
    update_cache: yes
  become: yes

# Ensure we can act as unprivileged user
- name: Ensure ACL package is installed
  package:
    name: acl
    state: present
  become: yes

# Install frontend dependencies
- name: Install frontend dependencies (npm ci)
  command: npm ci
  args:
    chdir: "{{ frontend_app_path }}"
  become: yes
  become_user: django
  when: frontend_clean_install
  tags:
    - molecule-notest

- name: Install frontend dependencies (npm install)
  command: npm install
  args:
    chdir: "{{ frontend_app_path }}"
  become: yes
  become_user: django
  when: not frontend_clean_install
  tags:
    - molecule-notest

# Build frontend assets
- name: Build frontend assets
  command: "{{ frontend_build_command }}"
  args:
    chdir: "{{ frontend_app_path }}"
  become: yes
  become_user: django
  notify:
    - Restart Gunicorn service
    - Restart web server
  tags:
    - molecule-notest

# Collect static files (picks up the Vite build output)
- name: Collect static files
  command: >
    /opt/{{ app_name }}/venv/bin/python
    /opt/{{ app_name }}/{{ django_project_dir }}/manage.py
    collectstatic --noinput
  args:
    chdir: "/opt/{{ app_name }}"
  become: yes
  become_user: django
  when: frontend_run_collectstatic
  tags:
    - molecule-notest
