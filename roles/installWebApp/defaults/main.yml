---
git_repository_branch: main
db_name: 'my_django_db'
db_host: 'localhost'
db_port: '5432'
db_engine: 'django.db.backends.postgresql'  # 'django.db.backends.sqlite3'
db_user: 'django'
vault_email_config:
  email_host: 'localhost'
  email_port: '587' # 25 without tls 465 for ssl
  email_use_tls: 'True'
  email_host_user: ''
  email_host_password: ''
  email_default_from: ''

# Vite dev mode (set to False for production deployments)
vite_dev_mode: "False"

# Logging
# Global log level applied to all app loggers. Valid values: DEBUG, INFO, WARNING, ERROR, CRITICAL
log_level: "WARNING"
# Optional absolute path to the log file. The parent directory must exist;
# it is created by this role when non-empty. Leave empty for console-only logging.
log_file: ""
# Optional per-app log level overrides. List of single-key dicts {appname: level}.
# The appname is uppercased and prefixed with LOG_LEVEL_ in the .env file.
# Example:
#   app_log_levels:
#     - backends: DEBUG
#     - bayesian_networks: INFO
app_log_levels: []

# Cache
cache_backend: "django.core.cache.backends.db.DatabaseCache"
cache_location: "django_cache"
