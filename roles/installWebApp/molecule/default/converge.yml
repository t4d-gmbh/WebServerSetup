---
- name: Converge
  hosts: all
  become: true
  tasks:
    - name: "Include installWebApp - only directory and user setup tasks"
      ansible.builtin.include_role:
        name: installWebApp
        tasks_from: main.yml
      tags:
        - molecule-converge
      vars:
        # Use a public repo that doesn't need a token
        vault_repository_token: ""
