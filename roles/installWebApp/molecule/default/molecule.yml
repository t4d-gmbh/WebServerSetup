---
role_name_check: 1
driver:
  name: docker
platforms:
  - name: instance
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "../../"
  inventory:
    host_vars:
      instance:
        app_name: testapp
        git_remote: "github.com/"
        git_repository_path: "octocat/Hello-World.git"
        git_repository_branch: master
        vault_repository_token: ""
        vault_db_password: "testdbpassword"
        db_name: "testdb"
        db_user: "testuser"
        db_host: "localhost"
        db_port: "5432"
        db_engine: "django.db.backends.sqlite3"
        vault_email_config:
          email_host: "localhost"
          email_port: "587"
          email_use_tls: "True"
          email_host_user: ""
          email_host_password: ""
          email_default_from: ""
scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    # Skip idempotence - git clone and pip install are not idempotent
    - verify
    - cleanup
    - destroy
