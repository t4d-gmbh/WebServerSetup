---
role_name_check: 1
driver:
  name: docker
platforms:
  - name: instance
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /var/lib/docker:exec
      - /var/lib/containerd
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "../../../"
  inventory:
    host_vars:
      instance:
        docker_user: testuser
        authentik_base_path: /data/docker/authentik
        AUTHENTIK_CONTAINER_NAME: authentik-server
        AUTHENTIK_TAG: "2025.6.3"
        dns_provider: infomaniak
        AUTHENTIK:
          server_url: "https://auth.test.example.com"
        AUTHENTIK_ENV:
          POSTGRES_USER: authentik
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: authentik
          AUTHENTIK_SECRET_KEY: test-secret-key-for-molecule
          AUTHENTIK_TAG: "2025.6.3"
scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    # Skip idempotence - docker_compose_v2 won't run without Docker
    - verify
    - cleanup
    - destroy
