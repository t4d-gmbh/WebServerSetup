---
- name: Verify authentik
  hosts: all
  become: true
  tasks:
    - name: Check base directory exists
      ansible.builtin.stat:
        path: /data/docker/authentik
      register: base_dir

    - name: Assert base directory exists
      ansible.builtin.assert:
        that:
          - base_dir.stat.exists
          - base_dir.stat.isdir
        fail_msg: "Base directory /data/docker/authentik does not exist"

    - name: Check subdirectories exist
      ansible.builtin.stat:
        path: "/data/docker/authentik/{{ item }}"
      register: subdirs
      loop:
        - certs
        - custom-templates
        - backups
        - database
        - media
        - redis

    - name: Assert all subdirectories exist
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.isdir
        fail_msg: "Subdirectory {{ item.item }} does not exist"
      loop: "{{ subdirs.results }}"

    - name: Check docker-compose.yml exists
      ansible.builtin.stat:
        path: /data/docker/authentik/docker-compose.yml
      register: compose_file

    - name: Assert docker-compose.yml exists
      ansible.builtin.assert:
        that:
          - compose_file.stat.exists
        fail_msg: "docker-compose.yml does not exist"

    - name: Read docker-compose.yml
      ansible.builtin.slurp:
        src: /data/docker/authentik/docker-compose.yml
      register: compose_content

    - name: Decode compose content
      ansible.builtin.set_fact:
        compose_text: "{{ compose_content.content | b64decode }}"

    - name: Assert compose file contains Traefik labels with correct host
      ansible.builtin.assert:
        that:
          - "'auth.test.example.com' in compose_text"
          - "'traefik.enable=true' in compose_text"
          - "'certresolver=infomaniak' in compose_text"
        fail_msg: "docker-compose.yml missing expected Traefik configuration"

    - name: Assert compose file contains correct container name
      ansible.builtin.assert:
        that:
          - "'authentik-server' in compose_text"
        fail_msg: "docker-compose.yml missing expected container name"

    - name: Assert Redis is NOT skipped for version 2025.6.3
      ansible.builtin.assert:
        that:
          - "'authentik-redis' in compose_text"
        fail_msg: "Redis should be present for Authentik 2025.6.3 but is missing"

    - name: Check .env file exists
      ansible.builtin.stat:
        path: /data/docker/authentik/.env
      register: env_file

    - name: Assert .env file exists
      ansible.builtin.assert:
        that:
          - env_file.stat.exists
        fail_msg: ".env file does not exist"

    - name: Read .env file
      ansible.builtin.slurp:
        src: /data/docker/authentik/.env
      register: env_content

    - name: Decode env content
      ansible.builtin.set_fact:
        env_text: "{{ env_content.content | b64decode }}"

    - name: Assert .env contains required keys
      ansible.builtin.assert:
        that:
          - "'POSTGRES_USER=authentik' in env_text"
          - "'POSTGRES_PASSWORD=testpassword' in env_text"
          - "'POSTGRES_DB=authentik' in env_text"
          - "'AUTHENTIK_SECRET_KEY=test-secret-key-for-molecule' in env_text"
        fail_msg: ".env file missing expected keys"

    - name: Check entrypoint.sh uses correct POSTGRES_USER variable
      ansible.builtin.command: grep 'POSTGRES_USER' /data/docker/authentik/entrypoint.sh
      register: entrypoint_check
      changed_when: false

    - name: Assert entrypoint uses POSTGRES_USER (not POSGTRES_USER)
      ansible.builtin.assert:
        that:
          - "'POSTGRES_USER' in entrypoint_check.stdout"
        fail_msg: "entrypoint.sh has wrong POSTGRES_USER variable name"

    - name: Check Dockerfile.backup exists
      ansible.builtin.stat:
        path: /data/docker/authentik/Dockerfile.backup
      register: dockerfile

    - name: Assert Dockerfile.backup exists
      ansible.builtin.assert:
        that:
          - dockerfile.stat.exists
        fail_msg: "Dockerfile.backup does not exist"
