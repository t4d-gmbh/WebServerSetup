---
role_name_check: 1
driver:
  name: docker
platforms:
  - name: instance
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  inventory:
    host_vars:
      instance:
        app_name: testapp
        celery_user: django
        celery_group: www-data
        celery_worker_name: "worker1"
        celery_time_limit: 300
        celery_concurrency: 4
        celery_log_level: "DEBUG"
        celery_log_file: "/var/log/celery/%n%I.log"
        celery_pid_file: "/var/run/celery/%n.pid"
        rabbitmq_version: "latest"
scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    # Skip idempotence - Docker/systemd interactions
    - verify
    - cleanup
    - destroy
