---
- name: Verify basic_config
  hosts: all
  become: true
  tasks:
    - name: Check that swap file exists
      ansible.builtin.stat:
        path: /testswap
      register: swap_file

    - name: Assert swap file exists
      ansible.builtin.assert:
        that:
          - swap_file.stat.exists
          - swap_file.stat.mode == '0600'
        fail_msg: "Swap file does not exist or has wrong permissions"

    - name: Check fstab for swap entry
      ansible.builtin.command: grep /testswap /etc/fstab
      register: fstab_check
      changed_when: false

    - name: Assert fstab contains swap entry
      ansible.builtin.assert:
        that:
          - fstab_check.rc == 0
        fail_msg: "Swap file entry not found in /etc/fstab"

    - name: Read swappiness value
      ansible.builtin.command: cat /proc/sys/vm/swappiness
      register: swappiness
      changed_when: false

    - name: Assert swappiness is set correctly
      ansible.builtin.assert:
        that:
          - swappiness.stdout == "10"
        fail_msg: "vm.swappiness is {{ swappiness.stdout }}, expected 10"

    - name: Read vfs_cache_pressure value
      ansible.builtin.command: cat /proc/sys/vm/vfs_cache_pressure
      register: vfs_cache
      changed_when: false

    - name: Assert vfs_cache_pressure is set correctly
      ansible.builtin.assert:
        that:
          - vfs_cache.stdout == "50"
        fail_msg: "vm.vfs_cache_pressure is {{ vfs_cache.stdout }}, expected 50"
