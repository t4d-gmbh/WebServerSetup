---
- name: Verify basic_config
  hosts: all
  become: true
  tasks:
    - name: Check that swap file exists
      ansible.builtin.stat:
        path: /testswap
      register: swap_file

    - name: Assert swap file exists with correct permissions
      ansible.builtin.assert:
        that:
          - swap_file.stat.exists
          - swap_file.stat.mode == '0600'
        fail_msg: "Swap file does not exist or has wrong permissions"

    - name: Check fstab for swap entry
      ansible.builtin.command: grep /testswap /etc/fstab
      register: fstab_check
      changed_when: false

    - name: Assert fstab contains swap entry
      ansible.builtin.assert:
        that:
          - fstab_check.rc == 0
        fail_msg: "Swap file entry not found in /etc/fstab"

    # NOTE: swapon and sysctl cannot be tested in Docker containers.
    # The swapon, vm.swappiness, and vm.vfs_cache_pressure tasks are
    # tagged with molecule-notest and skipped during converge.
