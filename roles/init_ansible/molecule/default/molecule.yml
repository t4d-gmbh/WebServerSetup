---
role_name_check: 1
driver:
  name: docker
platforms:
  - name: instance
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "../../"
  inventory:
    host_vars:
      instance:
        new_ansible_user: testansible
        public_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAITestKeyForMoleculeTesting molecule@test"
