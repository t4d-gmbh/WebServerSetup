---
role_name_check: 1
driver:
  name: docker
platforms:
  - name: instance
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "../../"
  inventory:
    host_vars:
      instance:
        vault_infomaniak_DNS_key: "test-dns-key-for-molecule"
        certbot_email: "test@example.com"
        domain_name: "test.example.com"
        cert_path: "/etc/letsencrypt/live/test.example.com/fullchain.pem"
        key_path: "/etc/letsencrypt/live/test.example.com/privkey.pem"
scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    # Skip idempotence - certbot obtain will always differ
    - verify
    - cleanup
    - destroy
