---
role_name_check: 1
driver:
  name: docker
platforms:
  - name: instance
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "../../"
  inventory:
    host_vars:
      instance:
        app_name: testapp
        git_remote: "github.com/"
        git_repository_path: "octocat/Hello-World.git"
        git_repository_branch: master
        vault_repository_token: ""
scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    # Skip idempotence - git operations and pip install
    - verify
    - cleanup
    - destroy
