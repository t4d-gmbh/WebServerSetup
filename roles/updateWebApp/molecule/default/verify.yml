---
- name: Verify updateWebApp
  hosts: all
  become: true
  tasks:
    - name: Check application directory has git repo
      ansible.builtin.stat:
        path: /opt/testapp/.git
      register: git_dir

    - name: Assert git repo exists
      ansible.builtin.assert:
        that:
          - git_dir.stat.exists
          - git_dir.stat.isdir
        fail_msg: "Git repository not found in /opt/testapp"

    - name: Check virtualenv exists
      ansible.builtin.stat:
        path: /opt/testapp/venv/bin/python
      register: venv_python

    - name: Assert virtualenv exists
      ansible.builtin.assert:
        that:
          - venv_python.stat.exists
        fail_msg: "Python virtualenv not found"

    - name: Check ACL is installed
      ansible.builtin.command: dpkg -l acl
      register: acl_check
      changed_when: false

    - name: Assert ACL is installed
      ansible.builtin.assert:
        that:
          - acl_check.rc == 0
        fail_msg: "ACL package is not installed"
