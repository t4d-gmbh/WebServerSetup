---
role_name_check: 1
driver:
  name: docker
platforms:
  - name: instance
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "../../../roles"
  inventory:
    host_vars:
      instance:
        # docker role
        dancer_user: testuser
        # authentik role
        docker_user: testuser
        authentik_base_path: /data/docker/authentik
        AUTHENTIK_CONTAINER_NAME: authentik-server
        AUTHENTIK_TAG: "2025.6.3"
        dns_provider: infomaniak
        AUTHENTIK:
          server_url: "https://auth.test.example.com"
        AUTHENTIK_ENV:
          POSTGRES_USER: authentik
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: authentik
          AUTHENTIK_SECRET_KEY: test-secret-key
          AUTHENTIK_TAG: "2025.6.3"
        # opencpu role
        opencpu:
          DOMAIN: "r.test.example.com"
          AUTHENTIK_PROXY_CONTAINER: "authentik-server"
          CONTAINER_NAME: "opencpu"
          DOCKER_IMAGE: "docker.io/opencpu/ubuntu-24.04"
          DOCKER_TAG: "v2.2.14-2"
          RUN_R: []
        email: "test@example.com"
scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - verify
    - cleanup
    - destroy
