---
- name: Converge - Docker + Authentik + OpenCPU
  hosts: all
  become: true
  tasks:
    - name: Include docker role
      ansible.builtin.include_role:
        name: docker

    - name: Include authentik role
      ansible.builtin.include_role:
        name: authentik

    - name: Include opencpu role
      ansible.builtin.include_role:
        name: opencpu
