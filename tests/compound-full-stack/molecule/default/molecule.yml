---
role_name_check: 1
driver:
  name: docker
platforms:
  - name: instance
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /var/lib/docker:exec
      - /var/lib/containerd
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "../../../../roles"
  inventory:
    host_vars:
      instance:
        # basic_config
        swapfile_size: "64M"
        swapfile_path: "/testswap"
        swappiness_value: "10"
        vfs_cache_pressure_value: "50"
        # docker + shared
        dancer_user: testuser
        docker_user: testuser
        dns_provider: infomaniak
        email: "test@example.com"
        # traefik
        traefik:
          version: "3.5.4"
        HTPASSWD_USERS:
          - name: admin
            pw_hash: "$apr1$test$testhash"
        CERTRESOLVER:
          infomaniak:
            INFOMANIAK_ACCESS_TOKEN: "test-token"
        TRAEFIK_ENV:
          INFOMANIAK_ACCESS_TOKEN: "test-token"
        # authentik
        authentik_base_path: /data/docker/authentik
        AUTHENTIK_CONTAINER_NAME: authentik-server
        AUTHENTIK_TAG: "2025.6.3"
        AUTHENTIK:
          server_url: "https://auth.test.example.com"
        AUTHENTIK_ENV:
          POSTGRES_USER: authentik
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: authentik
          AUTHENTIK_SECRET_KEY: test-secret-key
          AUTHENTIK_TAG: "2025.6.3"
        # opencpu
        opencpu:
          DOMAIN: "r.test.example.com"
          AUTHENTIK_PROXY_CONTAINER: "authentik-server"
          CONTAINER_NAME: "opencpu"
          DOCKER_IMAGE: "docker.io/opencpu/ubuntu-24.04"
          DOCKER_TAG: "v2.2.14-2"
          RUN_R: []
scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - verify
    - cleanup
    - destroy
