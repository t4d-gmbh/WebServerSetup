---
- name: Converge - Docker + Authentik + Headscale
  hosts: all
  become: true
  tasks:
    - name: Include docker role
      ansible.builtin.include_role:
        name: docker

    - name: Create external proxy network
      community.docker.docker_network:
        name: proxy
        state: present

    - name: Include authentik role
      ansible.builtin.include_role:
        name: authentik

    - name: Include headscale role
      ansible.builtin.include_role:
        name: headscale
