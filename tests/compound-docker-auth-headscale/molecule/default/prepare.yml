---
- name: Prepare
  hosts: all
  become: true
  tasks:
    - name: Create test user
      ansible.builtin.user:
        name: testuser
        state: present

    - name: Install GPG (needed for docker role's apt_key)
      ansible.builtin.apt:
        name:
          - gpg
          - gpg-agent
          - python3-docker
        state: present
        update_cache: true
