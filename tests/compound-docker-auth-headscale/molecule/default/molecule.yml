---
role_name_check: 1
driver:
  name: docker
platforms:
  - name: instance
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "../../../roles"
  inventory:
    host_vars:
      instance:
        # docker role
        dancer_user: testuser
        # authentik role
        docker_user: testuser
        authentik_base_path: /data/docker/authentik
        AUTHENTIK_CONTAINER_NAME: authentik-server
        AUTHENTIK_TAG: "2025.6.3"
        dns_provider: infomaniak
        AUTHENTIK:
          server_url: "https://auth.test.example.com"
        AUTHENTIK_ENV:
          POSTGRES_USER: authentik
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: authentik
          AUTHENTIK_SECRET_KEY: test-secret-key
          AUTHENTIK_TAG: "2025.6.3"
        # headscale role
        headscale:
          version: "0.26.1"
        server_url: "https://hs.test.example.com"
        prefixes_v4: "100.64.0.0/10"
        prefixes_v6: "fd7a:115c:a1e0::/48"
        email: "test@example.com"
        nameservers:
          - "1.1.1.1"
        generate_new_api_key: false
scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - verify
    - cleanup
    - destroy
